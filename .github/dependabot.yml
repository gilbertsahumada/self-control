version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    labels:
      - dependencies
      - security
    groups:
      web-patches:
        update-types: [patch, minor]
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:30'
    labels:
      - dependencies
      - security
    groups:
      actions-patches:
        update-types: [patch, minor]
