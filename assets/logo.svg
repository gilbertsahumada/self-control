<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="phosphorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b4f4c2"/>
      <stop offset="55%" stop-color="#73e68a"/>
      <stop offset="100%" stop-color="#3e9e56"/>
    </linearGradient>
    <pattern id="scanlines" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="transparent"/>
      <rect width="6" height="1" fill="#000" opacity="0.22"/>
    </pattern>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Screen background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#0a140c"/>

  <!-- Faint phosphor inner glow -->
  <rect x="24" y="24" width="464" height="464" rx="76" ry="76"
        fill="none" stroke="#3e9e56" stroke-width="2" opacity="0.35"/>

  <g clip-path="url(#iconClip)">
    <!-- "M" block-letter glyph: two columns + two trapezoids meeting at center -->
    <g fill="url(#phosphorGrad)">
      <rect x="120" y="136" width="48" height="256"/>
      <rect x="344" y="136" width="48" height="256"/>
      <polygon points="168,136 220,136 256,230 256,290 168,180"/>
      <polygon points="344,136 292,136 256,230 256,290 344,180"/>
    </g>

    <!-- Cursor block underscore -->
    <rect x="216" y="420" width="80" height="28" fill="url(#phosphorGrad)"/>

    <!-- Scanline overlay -->
    <rect x="0" y="0" width="512" height="512" fill="url(#scanlines)"/>
  </g>
</svg>
