<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b4f4c2"/>
      <stop offset="55%" stop-color="#73e68a"/>
      <stop offset="100%" stop-color="#3e9e56"/>
    </linearGradient>
  </defs>

  <!-- Screen background -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="#0a140c"/>

